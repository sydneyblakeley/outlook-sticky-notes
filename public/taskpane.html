<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sticky Notes</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0ede6;height:100vh;display:flex;flex-direction:column;font-size:13px}
    .tabs{display:flex;background:#f3f3f3;border-bottom:1px solid #ddd;flex-shrink:0}
    .tab{flex:1;padding:9px 4px;font-size:11px;text-align:center;cursor:pointer;color:#666;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .tab.act{color:#1e4d78;font-weight:600;border-bottom-color:#1e4d78;background:white}
    .more-tab{padding:9px 10px;font-size:11px;cursor:pointer;color:#666;border-left:1px solid #ddd;flex-shrink:0}
    .pane{flex:1;overflow-y:auto;display:none;flex-direction:column}
    .pane.act{display:flex}
    .note-wrap{padding:10px 12px;flex:1;display:flex;flex-direction:column}
    .tape{width:38px;height:11px;border-radius:2px;margin:0 auto 5px;background:rgba(180,200,255,.5);border:0.5px solid rgba(160,180,240,.4)}
    .note-inner{border-radius:2px 2px 8px 2px;padding:9px 9px 7px;flex:1;display:flex;flex-direction:column;background:#FFF9C4}
    .note-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .note-title{font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:500;color:#7a6800}
    .note-date{font-size:10px;opacity:.7;color:#7a6800}
    .note-div{height:1px;margin-bottom:5px;opacity:.4;background:#f0dc00}
    .rte{display:flex;gap:2px;padding:3px 0 5px;flex-wrap:wrap;align-items:center}
    .tb{font-size:11px;padding:2px 5px;border-radius:3px;border:0.5px solid transparent;cursor:pointer;background:transparent;line-height:1;color:#3a3000}
    .tb:hover{background:rgba(0,0,0,.08)}
    .tbsep{width:0.5px;height:13px;background:rgba(0,0,0,.15);margin:0 2px;align-self:center}
    .editor{flex:1;min-height:100px;outline:none;font-size:13px;line-height:1.8;padding:2px 0;word-break:break-word;color:#3a3000}
    .editor:empty:before{content:attr(data-placeholder);opacity:.3;font-style:italic;pointer-events:none}
    .editor ul,.editor ol{padding-left:16px}
    .note-foot{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
    .save-status{font-size:10px;opacity:.6;font-style:italic;color:#7a6800}
    .save-status.saved{opacity:1;color:green}
    .clr-btn{font-size:10px;background:none;border-radius:3px;padding:2px 6px;cursor:pointer;opacity:.6;border:0.5px solid #f0dc00;color:#7a6800}
    .color-row{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid rgba(0,0,0,.08);flex-shrink:0;background:white}
    .color-lbl{font-size:11px;color:#666}
    .csw{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
    .csw:hover{transform:scale(1.2)}
    .csw.sel{border-color:#333;transform:scale(1.2)}
    .actions-wrap{padding:10px 12px}
    .ff-banner{border-radius:6px;padding:7px 10px;margin-bottom:8px;font-size:11px;font-weight:500}
    .ff-banner.ok{background:#e8f5e9;border:0.5px solid #a5d6a7;color:#2e7d32}
    .ff-banner.loading{background:#e3f2fd;border:0.5px solid #90caf9;color:#1565c0}
    .ff-banner.none{background:#f5f5f5;border:0.5px solid #ddd;color:#666;font-weight:400}
    .action-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:0.5px solid #eee}
    .action-item:last-child{border-bottom:none}
    .achk{width:14px;height:14px;margin-top:1px;cursor:pointer;flex-shrink:0;accent-color:#1e4d78}
    .atw{flex:1;min-width:0}
    .atxt{font-size:12px;color:#333;line-height:1.4}
    .atxt.dn{text-decoration:line-through;color:#999}
    .asrc{font-size:9px;padding:1px 4px;border-radius:3px;margin-top:1px;display:inline-block}
    .asrc.ff{background:#f3e5f5;color:#6c3483}
    .asrc.manual{background:#f5f5f5;color:#888}
    .adel{font-size:10px;color:#bbb;cursor:pointer;padding:0 2px;flex-shrink:0}
    .adel:hover{color:#e53935}
    .add-row{display:flex;gap:6px;margin-top:8px}
    .add-row input{flex:1;font-size:12px;padding:5px 7px;border:0.5px solid #ddd;border-radius:5px;background:white;color:#333}
    .add-row input:focus{outline:none;border-color:#1e4d78}
    .add-row button{font-size:11px;padding:5px 10px;border-radius:5px;border:0.5px solid #ddd;cursor:pointer;background:#f5f5f5;color:#333}
    .send-wrap{padding:10px 12px}
    .send-btn{width:100%;font-size:12px;padding:9px;border-radius:6px;border:none;background:#1e4d78;color:white;cursor:pointer;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px}
    .send-btn:hover{filter:brightness(.9)}
    .send-btn:disabled{opacity:.5;cursor:not-allowed}
    .draft-wrap{display:none;border:0.5px solid #ddd;border-radius:6px;overflow:hidden;margin-top:8px}
    .draft-bar{background:#f3f3f3;padding:5px 8px;display:flex;gap:5px;align-items:center;border-bottom:0.5px solid #ddd}
    .dt{font-size:10px;padding:2px 7px;border-radius:3px;border:0.5px solid #ddd;background:white;cursor:pointer;color:#333}
    .dt.send{background:#2e7d32;color:white;border-color:#2e7d32;font-weight:500}
    .draft-field{display:flex;padding:5px 8px;border-bottom:0.5px solid #eee;gap:6px;font-size:11px}
    .draft-lbl{color:#888;width:20px;flex-shrink:0}
    .draft-val{flex:1;color:#333;outline:none}
    .draft-hint{font-size:10px;color:#888;padding:4px 8px;background:#fffde7;border-bottom:0.5px solid #eee;text-align:center}
    .draft-body{padding:10px;font-size:12px;color:#333;line-height:1.8;outline:none;min-height:200px}
    .draft-foot{display:flex;gap:6px;padding:7px 8px;border-top:0.5px solid #eee;background:#f9f9f9;align-items:center}
    .dfb{font-size:11px;padding:5px 10px;border-radius:5px;border:0.5px solid;cursor:pointer;display:flex;align-items:center;gap:4px}
    .dfb.s{background:#2e7d32;color:white;border-color:#2e7d32;font-weight:500}
    .dfb.c{background:white;color:#333;border-color:#ddd}
    .sent-ok{display:none;background:#e8f5e9;border:0.5px solid #a5d6a7;border-radius:6px;padding:8px 10px;font-size:11px;color:#2e7d32;margin-top:8px;text-align:center}
    .more-panel{display:none;border-top:1px solid #ddd;background:white;flex-shrink:0;max-height:280px;overflow-y:auto}
    .more-panel.vis{display:block}
    .search-wrap{padding:8px 12px;border-bottom:0.5px solid #eee;background:white;position:sticky;top:0}
    .search-input{width:100%;font-size:12px;padding:5px 8px;border:0.5px solid #ddd;border-radius:5px;background:white;color:#333}
    .search-input:focus{outline:none;border-color:#1e4d78}
    .hist-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#888;padding:8px 12px 3px}
    .hist-item{padding:8px 12px;border-bottom:0.5px solid #eee;cursor:pointer}
    .hist-item:hover{background:#f9f9f9}
    .hist-date{font-size:10px;color:#888}
    .hist-meeting{font-size:12px;font-weight:500;color:#333;margin-bottom:2px}
    .hist-preview{font-size:11px;color:#666;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .notif{display:none;background:#1e4d78;color:white;padding:6px 12px;font-size:11px;justify-content:space-between;align-items:center;flex-shrink:0}
    .notif.vis{display:flex}
    .notif button{font-size:10px;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.4);background:transparent;color:white;cursor:pointer}
    .eslbl{font-size:13px;font-weight:500;text-decoration:underline;margin:10px 0 5px;color:#333}
    .ename{font-size:12px;font-weight:500;color:#1e4d78;margin:6px 0 2px}
    .ebul{padding-left:16px;margin:2px 0}
    .ebul li{font-size:12px;color:#333;margin:2px 0;line-height:1.5}
    .enhead{font-weight:500;font-size:12px;color:#333;margin:6px 0 2px}
    .pnote{min-height:28px;border-bottom:1px dashed #ddd;padding-bottom:6px;margin-bottom:8px;font-size:12px;color:#999;font-style:italic;outline:none}
    .pnote:focus{color:#333}
  </style>
</head>
<body>

<div class="notif" id="notif">
  <span>📌 Starting in 15 min — your note is ready</span>
  <button onclick="document.getElementById('notif').classList.remove('vis')">dismiss</button>
</div>

<div class="tabs">
  <div class="tab act" id="tab-note" onclick="showTab('note')">📝 Note</div>
  <div class="tab" id="tab-actions" onclick="showTab('actions')">✅ Actions <span id="ac-count" style="display:none;font-size:9px;background:#1e4d78;color:white;border-radius:10px;padding:1px 4px;margin-left:2px"></span></div>
  <div class="tab" id="tab-send" onclick="showTab('send')">📧 Send</div>
  <div class="more-tab" id="moreTab" onclick="toggleMore()">⋯</div>
</div>

<!-- NOTE PANE -->
<div class="pane act" id="pane-note">
  <div class="note-wrap">
    <div class="tape"></div>
    <div class="note-inner" id="noteInner">
      <div class="note-hdr">
        <span class="note-title" id="noteTitle">Loading…</span>
        <span class="note-date" id="noteDate"></span>
      </div>
      <div class="note-div"></div>
      <div class="rte">
        <button class="tb" onmousedown="fmt(event,'bold')"><b>B</b></button>
        <button class="tb" onmousedown="fmt(event,'italic')"><i>I</i></button>
        <button class="tb" onmousedown="fmt(event,'underline')"><u>U</u></button>
        <div class="tbsep"></div>
        <button class="tb" onmousedown="fmt(event,'insertUnorderedList')">•—</button>
        <button class="tb" onmousedown="fmt(event,'insertOrderedList')">1—</button>
        <div class="tbsep"></div>
        <button class="tb" onmousedown="fmtHL(event)" style="font-size:10px">▌HL</button>
      </div>
      <div class="editor" id="editor" contenteditable="true"
           data-placeholder="prep notes, questions, agenda…"
           oninput="onType()"></div>
      <div class="note-foot">
        <span class="save-status" id="saveStatus">—</span>
        <button class="clr-btn" onclick="clearNote()">clear</button>
      </div>
    </div>
  </div>
  <div class="color-row">
    <span class="color-lbl">Color:</span>
    <div class="csw sel" style="background:#FFF176" onclick="setColor('yellow')" id="sw-yellow"></div>
    <div class="csw" style="background:#B3E5FC" onclick="setColor('blue')" id="sw-blue"></div>
    <div class="csw" style="background:#C8E6C9" onclick="setColor('green')" id="sw-green"></div>
    <div class="csw" style="background:#F8BBD0" onclick="setColor('pink')" id="sw-pink"></div>
    <div class="csw" style="background:#FFE0B2" onclick="setColor('orange')" id="sw-orange"></div>
    <div class="csw" style="background:#E1BEE7" onclick="setColor('purple')" id="sw-purple"></div>
    <div class="csw" style="background:#F5F5F5;border:0.5px solid #ccc" onclick="setColor('white')" id="sw-white"></div>
  </div>
</div>

<!-- ACTIONS PANE -->
<div class="pane" id="pane-actions">
  <div class="actions-wrap">
    <div class="ff-banner loading" id="ffBanner">⏳ Checking Fireflies for your action items…</div>
    <div id="actionList"></div>
    <div class="add-row">
      <input type="text" id="actionInput" placeholder="Add action item…"
             onkeydown="if(event.key==='Enter')addAction()">
      <button onclick="addAction()">+ Add</button>
    </div>
  </div>
</div>

<!-- SEND PANE -->
<div class="pane" id="pane-send">
  <div class="send-wrap">
    <button class="send-btn" id="sendBtn" onclick="pullDraft()">
      <span style="font-size:14px">📧</span> Pull Fireflies recap into email draft
    </button>
    <div class="draft-wrap" id="draftWrap"></div>
    <div class="sent-ok" id="sentOk">✓ Meeting recap ready — open in Outlook Mail to send!</div>
  </div>
</div>

<!-- MORE PANEL -->
<div class="more-panel" id="morePanel">
  <div class="search-wrap">
    <input class="search-input" placeholder="Search past meeting notes…" oninput="doSearch(this.value)">
  </div>
  <div id="histSection">
    <div class="hist-title">Recent notes</div>
    <div id="histList"></div>
  </div>
</div>

<script>
const STORE = 'stickyNotes_v2';
const API = 'https://outlook-sticky-notes.vercel.app';

let meetingKey = null;
let meetingTitle = '';
let meetingDate = '';
let currentColor = 'yellow';
let saveTimer = null;
let moreOpen = false;
let localActions = [];
let ffData = null;

const CT = {
  yellow:{bg:'#FFF9C4',div:'#f0dc00',ink:'#3a3000',inkl:'#7a6800'},
  blue:  {bg:'#E1F5FE',div:'#4fc3f7',ink:'#01245a',inkl:'#0277bd'},
  green: {bg:'#E8F5E9',div:'#66bb6a',ink:'#1b3a1c',inkl:'#388e3c'},
  pink:  {bg:'#FCE4EC',div:'#f06292',ink:'#4a0020',inkl:'#c2185b'},
  orange:{bg:'#FFF3E0',div:'#ffa726',ink:'#4e1f00',inkl:'#e65100'},
  purple:{bg:'#F3E5F5',div:'#ab47bc',ink:'#2a0030',inkl:'#7b1fa2'},
  white: {bg:'#FAFAFA',div:'#bdbdbd',ink:'#212121',inkl:'#757575'},
};

function applyTheme(c) {
  const t = CT[c] || CT.yellow;
  document.getElementById('noteInner').style.background = t.bg;
  document.getElementById('editor').style.color = t.ink;
  document.getElementById('noteTitle').style.color = t.inkl;
  document.getElementById('noteDate').style.color = t.inkl;
  document.getElementById('saveStatus').style.color = t.inkl;
  document.querySelector('.clr-btn').style.borderColor = t.div;
  document.querySelector('.clr-btn').style.color = t.inkl;
  document.querySelectorAll('.csw').forEach(s => s.classList.remove('sel'));
  const sw = document.getElementById('sw-' + c);
  if (sw) sw.classList.add('sel');
}

function setColor(c) { currentColor = c; applyTheme(c); saveLocal(); }
function fmt(ev, cmd) { ev.preventDefault(); document.execCommand(cmd, false, null); }
function fmtHL(ev) { ev.preventDefault(); document.execCommand('hiliteColor', false, '#ffff88'); }

// ── Local storage ─────────────────────────────────────────────────────────────
function getAllNotes() {
  try { return JSON.parse(localStorage.getItem(STORE) || '{}'); } catch { return {}; }
}

function saveLocal() {
  const all = getAllNotes();
  all[meetingKey] = {
    html: document.getElementById('editor').innerHTML,
    color: currentColor,
    actions: localActions,
    title: meetingTitle,
    date: meetingDate,
    updated: new Date().toISOString()
  };
  localStorage.setItem(STORE, JSON.stringify(all));
  document.getElementById('saveStatus').textContent = 'saved ✓';
  document.getElementById('saveStatus').className = 'save-status saved';
  setTimeout(() => {
    document.getElementById('saveStatus').textContent = '—';
    document.getElementById('saveStatus').className = 'save-status';
  }, 2000);
}

function loadLocal() {
  const all = getAllNotes();
  const note = all[meetingKey];
  if (note) {
    document.getElementById('editor').innerHTML = note.html || '';
    currentColor = note.color || 'yellow';
    localActions = note.actions || [];
  } else {
    applyTheme('yellow');
    localActions = [];
  }
  applyTheme(currentColor);
  renderActions();
}

function onType() {
  document.getElementById('saveStatus').textContent = '…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveLocal, 900);
}

function clearNote() {
  if (!document.getElementById('editor').innerHTML.trim()) return;
  if (!confirm('Clear this note?')) return;
  document.getElementById('editor').innerHTML = '';
  saveLocal();
}

// ── Fireflies integration ─────────────────────────────────────────────────────
async function loadFireflies() {
  const banner = document.getElementById('ffBanner');
  try {
    const params = new URLSearchParams({
      meeting_title: meetingTitle,
      meeting_date: meetingDate
    });
    const res = await fetch(`${API}/api/fireflies?${params}`);
    const data = await res.json();

    if (data.found && data.my_actions && data.my_actions.length > 0) {
      ffData = data;
      // Add Fireflies actions that aren't already in local list
      const existingFF = localActions.filter(a => a.source === 'fireflies');
      if (existingFF.length === 0) {
        data.my_actions.forEach(text => {
          localActions.push({ text, done: false, source: 'fireflies' });
        });
        saveLocal();
      }
      banner.className = 'ff-banner ok';
      banner.textContent = `🔥 ${data.my_actions.length} action item${data.my_actions.length > 1 ? 's' : ''} imported from Fireflies`;
      renderActions();
    } else if (data.found) {
      ffData = data;
      banner.className = 'ff-banner none';
      banner.textContent = '🔥 Meeting found in Fireflies — no action items assigned to you';
    } else {
      banner.className = 'ff-banner none';
      banner.textContent = 'Add action items manually or connect Fireflies to auto-import';
    }
  } catch(e) {
    banner.className = 'ff-banner none';
    banner.textContent = 'Add action items manually';
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
function renderActions() {
  const list = document.getElementById('actionList');
  list.innerHTML = '';
  localActions.forEach((a, i) => {
    const row = document.createElement('div');
    row.className = 'action-item';
    const chk = document.createElement('input');
    chk.type = 'checkbox'; chk.className = 'achk'; chk.checked = a.done;
    chk.onchange = () => { localActions[i].done = chk.checked; renderActions(); updateAC(); saveLocal(); };
    const tw = document.createElement('div'); tw.className = 'atw';
    const txt = document.createElement('div');
    txt.className = 'atxt' + (a.done ? ' dn' : '');
    txt.textContent = a.text;
    const src = document.createElement('span');
    src.className = 'asrc ' + (a.source === 'fireflies' ? 'ff' : 'manual');
    src.textContent = a.source === 'fireflies' ? '🔥 Fireflies' : 'manual';
    tw.appendChild(txt); tw.appendChild(src);
    const del = document.createElement('span');
    del.className = 'adel'; del.textContent = '✕';
    del.onclick = () => { localActions.splice(i, 1); renderActions(); updateAC(); saveLocal(); };
    row.appendChild(chk); row.appendChild(tw); row.appendChild(del);
    list.appendChild(row);
  });
  updateAC();
}

function updateAC() {
  const n = localActions.filter(a => !a.done).length;
  const el = document.getElementById('ac-count');
  el.style.display = n ? 'inline' : 'none';
  el.textContent = n;
}

function addAction() {
  const inp = document.getElementById('actionInput');
  const text = inp.value.trim();
  if (!text) return;
  localActions.push({ text, done: false, source: 'manual' });
  renderActions();
  saveLocal();
  inp.value = '';
}

// ── Send recap ────────────────────────────────────────────────────────────────
async function pullDraft() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Building draft…';
  document.getElementById('sentOk').style.display = 'none';

  // Build action items HTML grouped by person
  let aiHTML = '';
  if (ffData && ffData.all_actions) {
    Object.entries(ffData.all_actions).forEach(([name, items]) => {
      if (!items.length) return;
      aiHTML += `<div class="ename">@${name}</div><ul class="ebul">${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    });
  } else {
    const myOpen = localActions.filter(a => !a.done);
    if (myOpen.length) {
      aiHTML = `<div class="ename">@Sydney Zindroski</div><ul class="ebul">${myOpen.map(a => `<li>${a.text}</li>`).join('')}</ul>`;
    } else {
      aiHTML = '<div style="font-size:12px;color:#999">No open action items</div>';
    }
  }

  // Build notes HTML
  let notesHTML = '';
  if (ffData && ffData.summary) {
    notesHTML = `<div class="enhead">Meeting Summary</div><div style="font-size:12px;line-height:1.7;color:#333;margin-bottom:8px">${ffData.summary}</div>`;
  } else {
    notesHTML = '<div style="font-size:12px;color:#999;font-style:italic">Paste or type meeting notes here</div>';
  }

  const attendees = ffData?.attendees || '';

  document.getElementById('draftWrap').innerHTML = `
    <div class="draft-bar">
      <button class="dt send" onclick="doSend()">Send</button>
      <button class="dt">Discard</button>
      <button class="dt"><b>B</b></button>
      <button class="dt">•—</button>
      <button class="dt">📎</button>
    </div>
    <div class="draft-field"><span class="draft-lbl">To</span><div class="draft-val" contenteditable="true">${attendees}</div></div>
    <div class="draft-field"><span class="draft-lbl">Cc</span><div class="draft-val" contenteditable="true"></div></div>
    <div class="draft-field"><span class="draft-lbl">Re</span><div class="draft-val" contenteditable="true">Meeting Notes — ${meetingTitle} — ${meetingDate}</div></div>
    <div class="draft-hint">✏ Click anywhere to edit before sending</div>
    <div class="draft-body" contenteditable="true">
      <div class="pnote" contenteditable="true" data-placeholder="Type your personal note here…">Hi all,</div>
      <div class="eslbl">Action Items</div>
      ${aiHTML}
      <br>
      <div class="eslbl">Notes</div>
      ${notesHTML}
      <br>
      <div>Thanks,</div>
      <div>Sydney</div>
    </div>
    <div class="draft-foot">
      <button class="dfb s" onclick="doSend()">📧 Send to all</button>
      <button class="dfb c" onclick="copyDraft()">📋 Copy</button>
    </div>
  `;
  document.getElementById('draftWrap').style.display = 'block';
  btn.style.display = 'none';
}

function doSend() {
  document.getElementById('draftWrap').style.display = 'none';
  document.getElementById('draftWrap').innerHTML = '';
  document.getElementById('sendBtn').style.display = 'flex';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').innerHTML = '<span style="font-size:14px">📧</span> Pull Fireflies recap into email draft';
  document.getElementById('sentOk').style.display = 'block';
  setTimeout(() => document.getElementById('sentOk').style.display = 'none', 4000);
}

function copyDraft() {
  const body = document.querySelector('.draft-body');
  if (body) navigator.clipboard.writeText(body.innerText).catch(() => {});
}

// ── History ───────────────────────────────────────────────────────────────────
function loadHistory() {
  const all = getAllNotes();
  const items = Object.entries(all)
    .filter(([k, v]) => v.html && v.html.trim())
    .sort((a, b) => new Date(b[1].updated) - new Date(a[1].updated))
    .slice(0, 10);
  const list = document.getElementById('histList');
  if (!items.length) { list.innerHTML = '<div style="padding:12px;font-size:12px;color:#888;text-align:center">No past notes yet</div>'; return; }
  list.innerHTML = items.map(([k, v]) => `
    <div class="hist-item" onclick="loadFromHistory('${k}')">
      <div class="hist-date">${v.date || ''}</div>
      <div class="hist-meeting">${v.title || 'Untitled meeting'}</div>
      <div class="hist-preview">${v.html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,120)}</div>
    </div>
  `).join('');
}

function doSearch(q) {
  const all = getAllNotes();
  if (!q.trim()) { loadHistory(); document.querySelector('.hist-title').textContent = 'Recent notes'; return; }
  const results = Object.entries(all).filter(([k, v]) => {
    const text = ((v.title || '') + ' ' + (v.html || '').replace(/<[^>]+>/g,' ')).toLowerCase();
    return text.includes(q.toLowerCase());
  }).slice(0, 15);
  document.querySelector('.hist-title').textContent = results.length ? `Results for "${q}"` : 'No results';
  document.getElementById('histList').innerHTML = results.length
    ? results.map(([k, v]) => {
        const plain = (v.html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
        const hl = plain.replace(new RegExp(q,'gi'), m => `<mark style="background:#fff176">${m}</mark>`);
        return `<div class="hist-item"><div class="hist-date">${v.date||''}</div><div class="hist-meeting">${v.title||'Untitled'}</div><div class="hist-preview">${hl.slice(0,150)}</div></div>`;
      }).join('')
    : '<div style="padding:12px;font-size:12px;color:#888;text-align:center">No notes found</div>';
}

function loadFromHistory(key) {
  const note = getAllNotes()[key];
  if (!note) return;
  document.getElementById('editor').innerHTML = note.html || '';
  currentColor = note.color || 'yellow';
  applyTheme(currentColor);
  toggleMore();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(tab) {
  ['note','actions','send'].forEach(t => {
    document.getElementById('pane-' + t).classList.toggle('act', t === tab);
    document.getElementById('tab-' + t).classList.toggle('act', t === tab);
  });
  if (tab === 'actions' && !ffData) loadFireflies();
}

function toggleMore() {
  moreOpen = !moreOpen;
  document.getElementById('morePanel').classList.toggle('vis', moreOpen);
  document.getElementById('moreTab').textContent = moreOpen ? '✕' : '⋯';
  if (moreOpen) { loadHistory(); document.querySelector('.search-input').value = ''; document.querySelector('.hist-title').textContent = 'Recent notes'; }
}

function getMeetingKey(item) {
  try {
    if (item.itemId) return 'mtg_' + btoa(item.itemId).replace(/[^a-zA-Z0-9]/g,'').slice(0,40);
    return 'mtg_' + btoa(encodeURIComponent((item.subject||'') + '_' + Date.now())).replace(/[^a-zA-Z0-9]/g,'').slice(0,40);
  } catch(e) { return 'mtg_' + Math.random().toString(36).slice(2); }
}

// ── Office init ───────────────────────────────────────────────────────────────
Office.onReady((info) => {
  const item = Office.context.mailbox?.item;
  if (!item) { document.getElementById('noteTitle').textContent = 'No meeting selected'; return; }

  meetingKey = getMeetingKey(item);
  meetingTitle = item.subject || 'Untitled meeting';
  document.getElementById('noteTitle').textContent = meetingTitle;

  if (item.start) {
    const setDate = (d) => {
      const date = new Date(d);
      meetingDate = date.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      document.getElementById('noteDate').textContent = meetingDate;
      const minsUntil = (date - Date.now()) / 60000;
      if (minsUntil > 0 && minsUntil <= 20) document.getElementById('notif').classList.add('vis');
    };
    if (typeof item.start.getAsync === 'function') {
      item.start.getAsync(r => { if (r.status === Office.AsyncResultStatus.Succeeded) setDate(r.value); });
    } else if (item.start instanceof Date) { setDate(item.start); }
  }

  loadLocal();
  // Auto-load Fireflies in background
  loadFireflies();
});
</script>
